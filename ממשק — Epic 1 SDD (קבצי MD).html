<script type="text/plain" class="md" data-group="Root" data-title="CLAUDE.md" data-path="CLAUDE.md"># Epic 1 — Gemel Le'Hashkaa (Investment Provident Fund) · New Join Flow — SDD Repo

This repository is the **Spec-Driven Development (SDD)** workspace for **Epic 1:
onboarding a new, unidentified customer** (לקוח לא-מזוהה) to Migdal's investment
provident fund (**קופת גמל להשקעה**). It is the source of truth that drives
implementation by AI coding agents and human developers.

The flow already exists in production; this is a **re-build in internal
development** (replacing today's LPS configured-forms engine) — first at
functional parity, on existing services only.

## What's in here

- **`Constitution/`** — the foundational, slow-changing context every agent reads first:
  - `mission.md` — business context & product intent (the *what & why*). PRD-like.
  - `tech-stack.md` — technical context: existing services, integration contracts,
    architecture, NFRs. **Has known gaps — marked `TODO`.**
  - `roadmap.md` — the build plan: capability areas → stories/specs, build waves, status.
  - `principles.md` — non-negotiable governing principles for this epic.
- **`Specs/`** — one folder per business user story (`NN-slug/`), each holding a
  `requirements.md`. Most are **stubs** right now (title + source refs + `TODO`) —
  to be filled one at a time, just-in-time.
- **`CHANGELOG.md`** — living log of decisions & changes (a communication tool for
  the team and for the agents that read it).

## Source of truth

All content here derives from the validated business+context doc:
**`../אפיק 1 — דרישה וקונטקסט מלא (ל-SDD).md`** (§-numbered). Each file cites the
sections it was seeded from. When this repo and that doc disagree, reconcile
deliberately and log it in `CHANGELOG.md`.

## How we work (SDD conventions)

- **The spec is the brain, the agent is the muscle.** A spec separates *what/why*
  (`requirements`) from *how* (`plan`). Write the spec before the code.
- **Architect, not foreman.** Humans supervise, verify, and decide; we don't dictate
  line-by-line implementation. **Review every diff.**
- **Small steps.** Build a thin **walking skeleton** first, then grow vertically.
  One task group at a time; commit frequently.
- **Fresh context per spec.** Start each spec with a clean agent context (`/clear`);
  load the `Constitution/` + that one spec.
- **Living documents.** The Constitution and specs are updated as we learn —
  ideally on a separate branch, reviewed.
- **Blocked = don't finalize.** Any item marked 🔴 (open question) must **not** be
  turned into a final spec until the question is closed. See `Constitution/roadmap.md`
  and the source doc §11.
- **Don't invent the unknown.** Where a technical decision isn't known yet
  (frameworks, environments, service schemas), it is marked `TODO` — leave it as a
  hole until Digital/engineering provides it.
- **Provenance discipline.** Distinguish ✅ confirmed · 🟡 assumption/to-verify ·
  🔴 blocked · ⬜ placeholder/not-final.

## Status — 2026-06-17

Scaffold / infrastructure stage. Constitution seeded from the business doc (gaps
marked). 14 spec folders created as stubs. Known-missing technical context (dev
environments, full service schemas, frontend/backend stack) is flagged `TODO` in
`Constitution/tech-stack.md` — **do not invent it**.

## Language

Repo files are in **English** for agent/dev consumption; **Hebrew product terms and
labels are kept inline** where they are the real names (service names and screen
labels, e.g. הרשאה לחיוב, היכרות פיננסית, קוד מוסד 602, מסלולי השקעה).

<script type="text/plain" class="md" data-group="Constitution" data-title="mission" data-path="Constitution/mission.md"># Mission — Epic 1: Unidentified-Customer Join Flow (קופת גמל להשקעה)

## Overview

Migdal's **Digital division** is rebuilding the online join flow for **קופת גמל
להשקעה** (Investment Provident Fund — a liquid, tax-advantaged long-term savings
product). The flow already exists in production; this is a **re-build in internal
development** (replacing the current **LPS** configured-forms engine), not a new
product.

**Epic 1** delivers that same flow for a **new, unidentified customer**
(לקוח לא-מזוהה), using **only services that exist in Digital today**. It is the
modular base on which Epics 2–3 (identified customer / MDM; Ministry-of-Interior,
automatic standing-order, UX) will be built.

Why it matters strategically:

1. **First SDD pilot in the organization** — prove fast, end-to-end
   spec → implementation delivery (~3 weeks).
2. **AI Product Managers in the loop** — PMs co-produce the specs and context that
   drive the build.

## The problem

Today's digital join runs on **LPS** — configured forms that emit a "form" the
back office then processes. It is not real screen development: no control over UX,
no foundation to extend. To enable the digital vision (and later grow digital's
share of joins), the flow must be rebuilt in internal development — first at
**functional parity**, on existing services only.

## Goals & outcomes

- **Functional parity** with the existing flow, in our own development.
- Improved **UI/UX**.
- A **modular base** for Epics 2–3.
- **Compliance** (KYC/AML, tax residency) as it exists today.

Outcome: full reproduction of current functionality in internal development, and a
measurable baseline for future conversion.

**Top business KPI (context):** grow the **digital share of joins** (today ~**8%**)
— not total growth. On-time delivery (~3 weeks) as proof of SDD capability.

## Personas

- **New unidentified customer (adult, for self):** joins with no login or history;
  enters all details manually; wants a fast, clear process.
- **Unidentified parent (for their child):** the **parent is the depositor**,
  acting as **guardian (אפוטרופוס)** for the child (the saver); enters the child's
  details alongside their own.
- **Existing customer (with or without an existing fund) — still unidentified:**
  may join, but receives the **same generic flow** as any unidentified customer.
  No special handling in Epic 1.

## Scope

**In Epic 1:** unidentified customer (adult for self, or parent for child) ·
**OTP** mobile verification · full manual data entry · tax-residency declaration
(checkbox) · annual-ceiling display + track selection (up to 6) · **KYC for all**
(data collection) · payment: **bank transfer** (one-time) and **debit
authorization the customer sets up at their own bank** (monthly) · ID-photo upload
· back-office emission as today (Glikson / XML / Sigal / Noga / IMAGE) · analytics
& leads (Glassbox / Salesforce). **Existing services only.**

**Out of Epic 1:**
- ❌ **Ministry-of-Interior** (משרד הפנים) verification → Epic 3.
- ❌ **Automatic standing-order** (הו"ק) from within the flow → Epic 3.
- ❌ **MDM** / existing-customer identification → Epic 2.
- ❌ **Digital signature** — not part of this flow.

## Business assumptions (source §8)

- Product: liquid, tax-advantaged provident fund.
- Annual ceiling ≈ **83,641 ₪** per calendar year; for an unidentified customer —
  only by what they enter (no history). *Data source: `TODO` 🔴 — see `tech-stack.md`.*
- Customer types: unidentified adult (self) · parent as guardian (for child).
- OTP required — for **mobile verification** (not login / not identification).
- KYC for all; data collection only. "Yes"-branches beyond business-owner are 🔴 open.
- Tax residency = **mandatory checkbox** (no full FATCA/CRS questionnaire).
- Payment: one-time = bank transfer + reference (אסמכתא); monthly = debit
  authorization (הרשאה לחיוב) the customer sets up at their own bank
  (**קוד מוסד 602**).
- **No digital signature.**
- Fund number assigned only at completion (not shown to the customer until the fund
  is actually created).
- Glassbox analytics + Salesforce lead on abandonment — existing, in scope.

## Success metrics

- Full functional parity with the existing flow, in internal development.
- On-time delivery (~3 weeks) as SDD proof.
- A measurable baseline for future conversion (digital share > ~8%).

## Open questions (business) — do not finalize dependent specs

Carried from source doc **§11**. Key blockers:
- KYC **"yes" / red-path** handling, and whether a **digital block** exists at all.
- Ceiling + management-fee **data source** (under review by Rafi).
- Tracks **slider / visual logic** (needs product definition).
- **OTP** service / mechanism.
- **Post-ID-upload** view & error handling.

*(Full detail lives in the source doc; build status in `roadmap.md`.)*

<script type="text/plain" class="md" data-group="Constitution" data-title="principles" data-path="Constitution/principles.md"># Principles — Epic 1 (the Constitution's non-negotiables)

> Governing principles for every spec and every implementation in this epic,
> derived from the source doc **§6**. If a spec or a piece of code conflicts with
> these, the principle wins — or the principle is changed **deliberately** and
> logged in `CHANGELOG.md`.

1. **Identity-lite.** The customer is unidentified. No login, no external data pull.
   OTP is for **mobile verification only** — not identification, not login.
2. **Parity-first.** Epic 1 reproduces the existing behavior in internal
   development. Whatever is not known with certainty defaults to **parity with the
   existing flow**, not invention.
3. **Existing services only.** The scope boundary is the service catalog in
   `tech-stack.md`. No new service in Epic 1.
4. **Compliance by design.** The tax-residency declaration and KYC/AML data
   collection are built into the flow, even where some branches are still open.
5. **Single source of truth for rules.** Ceiling, management fees, track types, and
   KYC rules come from **one defined source** — not scattered across UI logic.
6. **Modular internal development.** Structure the build so Epics 2–3 can be added
   without a rewrite.
7. **Explicit interface contracts.** Every existing service has a defined
   input / output contract (a Contract-Spec).
8. **Back office unchanged.** Output to the back office (Glikson→XML→Sigal, Noga,
   IMAGE) is **identical to today** — do not change the outgoing contract.
9. **No digital signature** in Epic 1.
10. **Accessibility + analytics** (Glassbox, Salesforce leads) are part of the NFR
    baseline.

---
*Source: `../../אפיק 1 — דרישה וקונטקסט מלא (ל-SDD).md` (§6). Seeded 2026-06-17.*

(function(){
  var ok=!!(window.marked);
  if(ok&&window.marked.setOptions){marked.setOptions({gfm:true,breaks:false,headerIds:false,mangle:false});}
  if(!ok){var w=document.getElementById('warn');if(w)w.style.display='block';}
  var blocks=[].slice.call(document.querySelectorAll('#store script.md')).map(function(s){
    return {group:s.getAttribute('data-group'),title:s.getAttribute('data-title'),path:s.getAttribute('data-path'),text:s.textContent};
  });
  var groups=[{key:'Root',label:'שורש · Root'},{key:'Constitution',label:'חוקה · Constitution'},{key:'Specs',label:'ספקים · Specs'}];
  var state={group:'Root',path:blocks.length?blocks[0].path:null,q:'',mode:'designed'};
  var tabsEl=document.getElementById('tabs'),listEl=document.getElementById('filelist'),mdEl=document.getElementById('md'),crumbEl=document.getElementById('crumb'),searchEl=document.getElementById('search');
  function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function md2html(t){try{if(window.marked)return marked.parse?marked.parse(t):marked(t);}catch(e){}return '<pre class="raw">'+esc(t)+'</pre>';}
  function byPath(p){for(var i=0;i<blocks.length;i++)if(blocks[i].path===p)return blocks[i];return null;}
  function leaf(b){var n=b.path;if(b.group==='Constitution')n=b.path.replace('Constitution/','');else if(b.group==='Specs')n=b.path.replace('Specs/','');return '<a class="tl" data-path="'+b.path+'">'+n+'</a>';}
  function buildTree(){var root=blocks.filter(function(b){return b.group==='Root';}),cons=blocks.filter(function(b){return b.group==='Constitution';}),spec=blocks.filter(function(b){return b.group==='Specs';});var L=[];L.push('<span class="dir">epic1-gemel-sdd/</span>');root.forEach(function(b){L.push('├── '+leaf(b));});L.push('├── <span class="dir">Constitution/</span>');cons.forEach(function(b,i){L.push('│   '+(i===cons.length-1?'└── ':'├── ')+leaf(b));});L.push('└── <span class="dir">Specs/</span>');spec.forEach(function(b,i){L.push('    '+(i===spec.length-1?'└── ':'├── ')+leaf(b));});document.getElementById('tree').innerHTML=L.join('\n');}
  function enhance(el){var h=el.innerHTML;h=h.replace(/🔴🔴/g,'@@R2@@').replace(/🔴/g,'<span class="pill p-red">🔴</span>').replace(/@@R2@@/g,'<span class="pill p-red2">🔴🔴</span>').replace(/✅/g,'<span class="pill p-ok">✅</span>').replace(/🟡/g,'<span class="pill p-warn">🟡</span>').replace(/⚙️/g,'<span class="pill p-cog">⚙️</span>').replace(/⬜/g,'<span class="pill p-todo">⬜</span>').replace(/\bTODO\b/g,'<span class="chip-todo">TODO</span>');el.innerHTML=h;}
  function tabs(){tabsEl.innerHTML='';groups.forEach(function(g){var cnt=blocks.filter(function(b){return b.group===g.key;}).length;var btn=document.createElement('button');btn.className='tab'+(state.group===g.key?' active':'');btn.innerHTML=g.label+' <span class="cnt">'+cnt+'</span>';btn.onclick=function(){state.group=g.key;state.q='';searchEl.value='';var f=blocks.filter(function(b){return b.group===g.key;})[0];state.path=f?f.path:null;all();};tabsEl.appendChild(btn);});}
  function list(){listEl.innerHTML='';var q=state.q.toLowerCase();var items=blocks.filter(function(b){return b.group===state.group&&(!q||(b.title+' '+b.path).toLowerCase().indexOf(q)>=0);});if(!items.length){listEl.innerHTML='<div class="empty">אין תוצאות</div>';return;}items.forEach(function(b){var a=document.createElement('button');a.className='file'+(state.path===b.path?' active':'');a.innerHTML='<span class="ft">'+esc(b.title)+'</span><span class="fp">'+esc(b.path)+'</span>';a.onclick=function(){state.path=b.path;content();list();};listEl.appendChild(a);});}
  function modesUI(){document.getElementById('mDesigned').className='mode'+(state.mode==='designed'?' active':'');document.getElementById('mMd').className='mode'+(state.mode==='md'?' active':'');}
  function content(){var b=byPath(state.path);if(!b){mdEl.innerHTML='';crumbEl.textContent='';return;}crumbEl.textContent=b.path;mdEl.className='md-body'+(state.mode==='designed'?' designed':'');mdEl.innerHTML=md2html(b.text);if(state.mode==='designed')enhance(mdEl);modesUI();}
  function navigate(p){var b=byPath(p);if(!b)return;state.group=b.group;state.path=p;all();window.scrollTo({top:0,behavior:'smooth'});}
  function all(){tabs();list();content();}
  searchEl.oninput=function(){state.q=searchEl.value;list();};
  document.getElementById('mDesigned').onclick=function(){state.mode='designed';content();};
  document.getElementById('mMd').onclick=function(){state.mode='md';content();};
  document.getElementById('treetoggle').onclick=function(){var t=document.getElementById('tree');t.classList.toggle('collapsed');document.getElementById('chev').textContent=t.classList.contains('collapsed')?'▸':'▾';};
  document.getElementById('tree').addEventListener('click',function(e){var a=e.target.closest('a.tl');if(a){e.preventDefault();navigate(a.getAttribute('data-path'));}});
  buildTree();all();
})();
